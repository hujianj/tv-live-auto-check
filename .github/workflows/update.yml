name: Verify and publish IPTV auto-check playlist

on:
  workflow_dispatch:
  schedule:
    # 04:20 and 16:20 Beijing time (20:20 and 08:20 UTC).
    - cron: "20 8,20 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/*.py"
      - "config/*.json"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  issues: write

# A full run can take 20–30 minutes. Never cancel a valid run because a manual
# dispatch, watchdog, or code push arrived while it was doing real probes.
concurrency:
  group: iptv-autocheck-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Refuse publication from a non-default branch
        if: ${{ github.ref_type != 'branch' || github.ref_name != github.event.repository.default_branch }}
        run: |
          echo "Only the default branch may run the publication pipeline."
          echo "ref_type=${{ github.ref_type }} ref_name=${{ github.ref_name }} default=${{ github.event.repository.default_branch }}"
          exit 1
      - name: Record source revision
        run: echo "SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Run complete maintenance pipeline with bounded full retry
        id: maintenance
        env:
          IPTV_CHECK_WORKERS: "192"
          IPTV_CHECK_WORKERS_PER_HOST: "8"
          IPTV_CHECK_TIMEOUT: "6"
          IPTV_FETCH_WORKERS: "64"
          IPTV_FETCH_TIMEOUT: "20"
          IPTV_HLS_VARIANT_CHECKS: "2"
          IPTV_HLS_SEGMENT_CHECKS: "2"
          IPTV_CORE_HLS_SEGMENT_CHECKS: "3"
          IPTV_CORE_RETRY_ATTEMPTS: "1"
          IPTV_CORE_RETRY_TIMEOUT: "14"
          IPTV_HLS_PROGRESS_MIN_WAIT: "3"
          IPTV_HLS_PROGRESS_MAX_WAIT: "14"
          IPTV_PUBLISHED_RECHECK_WORKERS: "64"
          IPTV_PUBLISHED_REFILL_WORKERS: "24"
          IPTV_PUBLISHED_FINAL_RETRY_WORKERS: "16"
          IPTV_PUBLISHED_FINAL_RETRY_TIMEOUT: "14"
          IPTV_PUBLISHED_FINAL_RETRY_ATTEMPTS: "1"
          IPTV_PUBLISHED_REQUIRE_CORE_PROGRESS: "1"
        run: python scripts/run_maintenance.py
      - name: Upload full diagnostic artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: full-iptv-check-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            stream_check_results.csv
            live-all-playable.txt
            all-playable.m3u
            curated-source-map.csv
            curated-candidate-pool.csv
            alias-conflict-report.md
            published_recheck_results.csv
            published-recheck-report.md
            final-publish-report.md
            stability-report.md
            coverage-report.md
            quality-audit-report.md
            publish-guard-report.md
            publish-size-report.md
            publish-manifest.json
            full-check-summary.json
            maintenance-run.json
      - name: Commit verified playlist without overwriting newer code
        id: commit
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" != "branch" ]; then
            echo "Ref is not a branch; refusing to publish generated files."
            exit 1
          fi
          if [ "$TARGET_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "Only the default branch may publish: target=$TARGET_BRANCH default=$DEFAULT_BRANCH"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t publish_files < <(python scripts/publication_config.py --publication-files)
          git add -- "${publish_files[@]}" publish-manifest.json
          if git diff --cached --quiet; then
            echo "No verified publication changes to commit."
            exit 0
          fi
          git fetch origin "$TARGET_BRANCH"
          remote_sha=$(git rev-parse "origin/$TARGET_BRANCH")
          if [ "$remote_sha" != "$SOURCE_SHA" ]; then
            echo "Remote branch advanced during verification: source=$SOURCE_SHA remote=$remote_sha"
            echo "Refusing to publish results generated from stale code/configuration."
            exit 1
          fi
          git commit -m "chore: verify and publish playable IPTV playlist"
          git push origin "HEAD:$TARGET_BRANCH"
      - name: Purge subscription files from jsDelivr
        if: ${{ steps.commit.outcome == 'success' }}
        continue-on-error: true
        run: |
          set -u
          purge_pids=()
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            echo "Purging $file"
            (curl --retry 2 --max-time 20 -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}/$file") & purge_pids+=("$!")
            (curl --retry 2 --max-time 20 -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/$file") & purge_pids+=("$!")
          done < <(python scripts/publication_config.py --purge-files)
          purge_failures=0
          for pid in "${purge_pids[@]}"; do
            if ! wait "$pid"; then purge_failures=$((purge_failures + 1)); fi
          done
          echo "jsDelivr purge failures=$purge_failures" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Verify Raw and all configured publication endpoints
        id: cdn_health
        if: ${{ steps.commit.outcome == 'success' }}
        continue-on-error: true
        run: |
          set +e
          python scripts/check_publication_endpoints.py \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --global-deadline 240 \
            --retry-wait 3
          status=$?
          if [ -f cdn-health-report.md ]; then cat cdn-health-report.md >> "$GITHUB_STEP_SUMMARY"; fi
          exit "$status"
      - name: Upload CDN health artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cdn-health-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            cdn-health-report.md
            cdn-health-report.json
      - name: Notify hard maintenance failure
        if: ${{ always() && (steps.maintenance.outcome == 'failure' || steps.commit.outcome == 'failure') }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/notify_maintenance.py failure --message "The complete verification, publication, or commit gate did not pass."
      - name: Notify CDN pending state
        if: ${{ always() && steps.maintenance.outcome == 'success' && steps.commit.outcome == 'success' && steps.cdn_health.outcome == 'failure' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/notify_maintenance.py cdn_pending --message "Git publication succeeded, but one or more configured public endpoints are still stale or unreachable; Raw remains authoritative."
      - name: Close recovered maintenance issue
        if: ${{ always() && steps.maintenance.outcome == 'success' && steps.commit.outcome == 'success' && steps.cdn_health.outcome == 'success' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/notify_maintenance.py success
