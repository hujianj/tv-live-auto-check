name: Verify and publish IPTV auto-check playlist

on:
  workflow_dispatch:
  schedule:
    # Daily, Beijing time 04:20. Full stream verification probes every distinct URL.
    - cron: "20 20 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/*.py"
      - "config/*.json"
      - ".github/workflows/update.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: iptv-autocheck-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Refuse publication from a non-default branch
        if: ${{ github.ref_type != 'branch' || github.ref_name != github.event.repository.default_branch }}
        run: |
          echo "Only the default branch may run the publication pipeline."
          echo "ref_type=${{ github.ref_type }} ref_name=${{ github.ref_name }} default=${{ github.event.repository.default_branch }}"
          exit 1
      - name: Record source revision
        run: echo "SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Unit test parser, safety policy, media tracks, and publication validator
        run: python scripts/test_playlist_logic.py
      - name: Verify every unique IPTV stream URL
        env:
          IPTV_CHECK_WORKERS: "192"
          IPTV_CHECK_WORKERS_PER_HOST: "8"
          IPTV_CHECK_TIMEOUT: "6"
          IPTV_FETCH_WORKERS: "64"
          IPTV_FETCH_TIMEOUT: "20"
          IPTV_HLS_VARIANT_CHECKS: "2"
          IPTV_HLS_SEGMENT_CHECKS: "2"
          IPTV_CORE_HLS_SEGMENT_CHECKS: "3"
          IPTV_CORE_RETRY_ATTEMPTS: "1"
          IPTV_CORE_RETRY_TIMEOUT: "14"
          IPTV_HLS_PROGRESS_MIN_WAIT: "3"
          IPTV_HLS_PROGRESS_MAX_WAIT: "14"
          # Broad first pass proves live media bytes for every distinct URL.
          # The smaller final set below receives strict video-track proof.
          IPTV_REQUIRE_VIDEO_TRACK: "0"
        run: python scripts/verify_sources.py
      - name: Curate Ku9 channel order
        run: python scripts/curate_ku9.py
      - name: Recheck every final published stream URL with video-track proof
        env:
          IPTV_PUBLISHED_RECHECK_WORKERS: "64"
          IPTV_PUBLISHED_REFILL_WORKERS: "24"
          IPTV_PUBLISHED_REQUIRE_CORE_PROGRESS: "1"
          IPTV_CHECK_WORKERS_PER_HOST: "8"
          IPTV_CHECK_TIMEOUT: "6"
          IPTV_HLS_VARIANT_CHECKS: "2"
          IPTV_HLS_SEGMENT_CHECKS: "2"
          IPTV_CORE_HLS_SEGMENT_CHECKS: "3"
          IPTV_CORE_RETRY_ATTEMPTS: "1"
          IPTV_CORE_RETRY_TIMEOUT: "14"
          IPTV_HLS_PROGRESS_MIN_WAIT: "3"
          IPTV_HLS_PROGRESS_MAX_WAIT: "14"
          IPTV_REQUIRE_VIDEO_TRACK: "1"
        run: python scripts/recheck_published.py
      - name: Audit core channel coverage
        run: python scripts/audit_coverage.py
      - name: Audit final playlist quality
        run: python scripts/audit_quality.py
      - name: Validate complete publish bundle
        run: python scripts/validate_publish_bundle.py
      - name: Guard against shrunken or unsafe publish
        run: python scripts/guard_publish.py
      - name: Audit publish size and alias safety
        run: python scripts/audit_publish_size.py
      - name: Upload full diagnostic artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: full-iptv-check-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            stream_check_results.csv
            live-all-playable.txt
            all-playable.m3u
            curated-source-map.csv
            curated-candidate-pool.csv
            alias-conflict-report.md
            published_recheck_results.csv
            published-recheck-report.md
            final-publish-report.md
            stability-report.md
            coverage-report.md
            quality-audit-report.md
            publish-guard-report.md
            publish-size-report.md
      - name: Commit verified playlist without overwriting newer code
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" != "branch" ]; then
            echo "Ref is not a branch; refusing to publish generated files."
            exit 1
          fi
          if [ "$TARGET_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "Only the default branch may publish: target=$TARGET_BRANCH default=$DEFAULT_BRANCH"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- live.txt live-verified.txt live-curated.txt ku9-live.txt live.m3u ku9-family.txt live-family.txt family.m3u source-report.md check-report.md curated-report.md published-recheck-report.md final-publish-report.md stability-report.md stability-history.tsv coverage-report.md quality-audit-report.md publish-guard-report.md publish-size-report.md sources_status.csv full-check-summary.json
          if git diff --cached --quiet; then
            echo "No verified publication changes to commit."
            exit 0
          fi
          git fetch origin "$TARGET_BRANCH"
          remote_sha=$(git rev-parse "origin/$TARGET_BRANCH")
          if [ "$remote_sha" != "$SOURCE_SHA" ]; then
            echo "Remote branch advanced during verification: source=$SOURCE_SHA remote=$remote_sha"
            echo "Refusing to publish results generated from stale code/configuration."
            exit 1
          fi
          git commit -m "chore: verify and publish playable IPTV playlist"
          git push origin "HEAD:$TARGET_BRANCH"
      - name: Purge subscription files from jsDelivr
        run: |
          set -u
          for file in live-curated.txt live.txt ku9-live.txt live-verified.txt live.m3u ku9-family.txt live-family.txt family.m3u; do
            echo "Purging $file"
            (curl --retry 2 --max-time 20 -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}/$file" || true) &
            (curl --retry 2 --max-time 20 -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/$file" || true) &
          done
          wait
      - name: Verify Raw and at least one television-compatible publication endpoint
        run: |
          set +e
          python scripts/check_publication_endpoints.py \
            --repo "${{ github.repository }}" \
            --branch "${{ github.ref_name }}"
          status=$?
          if [ -f cdn-health-report.md ]; then
            cat cdn-health-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$status"
      - name: Upload CDN health artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cdn-health-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            cdn-health-report.md
            cdn-health-report.json
      - name: Open or update maintenance failure issue
        if: ${{ always() && (failure() || cancelled()) }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/notify_maintenance.py failure --message "The full verification, publication, or CDN endpoint gate did not pass."
      - name: Close recovered maintenance failure issue
        if: ${{ success() }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/notify_maintenance.py success
